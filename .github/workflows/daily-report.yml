# ═══════════════════════════════════════════════════════════
# DailyReportBot — GitHub Actions 自动化工作流
# ═══════════════════════════════════════════════════════════
#
# 功能：每天定时推送城市的日期/天气/节日/双语名言至 Telegram
# 所有 API 均为公开免费，无需注册或付费。
#
# ════════════════════ 📝 修改指南 ════════════════════
#
# ① 修改推送时间 → 编辑下方 cron 表达式
#    UTC 时间 = 北京时间 - 8 小时
#    例如：北京时间 8:00 = UTC 0:00 → cron: '0 0 * * *'
#          北京时间 18:00 = UTC 10:00 → cron: '0 10 * * *'
#
# ② 修改城市 → 编辑 scripts/daily_bot.py 的 __init__()
#    找到 self.city_name / self.city_code / self.latitude / self.longitude
#
# ③ 手动测试 → GitHub Actions 页面 → 选择本工作流 → "Run workflow"
#
# ═══════════════════════════════════════════════════════════

name: Daily Report Bot

on:
  schedule:
    # ── 定时触发：每天 UTC 0:00 = 北京时间 8:00 ──
    # 📝 修改指南：cron 有 5 个字段：分 时 日 月 星期
    #    北京时间 = UTC + 8，所以 UTC 0:00 = 北京时间 8:00
    - cron: '0 0 * * *'
  
  # ── 手动触发：允许在 GitHub Actions 页面手动运行 ──
  workflow_dispatch:

# ── 权限：contents: write 是保活机制所必需的
#    否则 github-actions[bot] 无法 push .keepalive 文件
permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai                     # 时区设为北京时间
      PYTHONDONTWRITEBYTECODE: '1'           # 不生成 .pyc 缓存
      PYTHONUNBUFFERED: '1'                  # 实时输出日志

    steps:
      # ── Step 1: 检出代码（完整历史，保活 push 需要） ──
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0                     # 获取完整 Git 历史

      # ── Step 2: 配置 Python 3.11 + pip 缓存加速 ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'                       # 缓存依赖，加速安装

      # ── Step 3: 安装依赖（仅需 requests） ──
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 4: 执行主脚本（TG 凭据从 Secrets 注入） ──
      - name: Run daily report script
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python scripts/daily_bot.py

      # ── Step 5-6: 保活机制（防止仓库 60 天无活动被归档） ──
      #   if: always() 确保即使主脚本失败也执行保活
      - name: Update keepalive timestamp
        if: always()
        run: |
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .keepalive

      - name: Commit keepalive
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .keepalive
          git commit -m "🔄 keepalive: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          git push || echo "Push failed (non-critical)"

      # ── Step 7: 失败时上传日志（保留 7 天供排查） ──
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: logs/
          retention-days: 7
