name: 每日速报推送

on:
  schedule:
    # 北京时间每天早上 7:00（UTC 23:00）
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CUSTOM_CITY: ${{ secrets.CUSTOM_CITY }}
          QWEATHER_API_KEY: ${{ secrets.QWEATHER_API_KEY }}
        run: python scripts/daily_report.py