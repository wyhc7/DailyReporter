name: 保活触跳 — 防止仓库休眠

on:
  schedule:
    # 每月1号 UTC 00:00（北京时间 08:00）
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 更新保活时间戳
        run: |
          date "+%Y-%m-%d %H:%M:%S UTC" > .keepalive

      - name: 提交并推送
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .keepalive
          git diff --staged --quiet || git commit -m "🔄 keepalive: $(date +%Y-%m)"
          git push origin main